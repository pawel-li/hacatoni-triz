<article
  class="relative grid border-2 border-[#111312] bg-[#f4f2e8] shadow-[0_18px_42px_rgb(0_0_0_/_42%)] after:pointer-events-none after:absolute after:-inset-[6px] after:z-10 after:content-[''] after:[background:radial-gradient(circle,#111312_3px,transparent_3.4px)_left_top/12px_12px_repeat-x,radial-gradient(circle,#111312_3px,transparent_3.4px)_left_bottom/12px_12px_repeat-x,radial-gradient(circle,#111312_3px,transparent_3.4px)_left_top/12px_12px_repeat-y,radial-gradient(circle,#111312_3px,transparent_3.4px)_right_top/12px_12px_repeat-y]"
  [class.aspect-[1.12]]="!contentOnly()"
  [class.w-[min(94vw,calc((100dvh-2rem)*1.12),560px)]]="!contentOnly()"
  [class.w-[min(92vw,430px)]]="contentOnly()"
  [class.grid-rows-1]="contentOnly()"
  [class.grid-rows-[34%_66%]]="!contentOnly()"
  [attr.aria-labelledby]="headingId()"
>
  <!-- ── Header slot ─────────────────────────────────────────────────
       Project any element with the [card-header] attribute here.
       Example: <nw-triangle-canvas card-header />
  ─────────────────────────────────────────────────────────────────── -->
  @if (!contentOnly()) {
    <div
      class="relative overflow-hidden border-b border-[rgb(17_19_18_/_18%)]"
      aria-hidden="true"
    >
      <ng-content select="[card-header]" />
    </div>
  }

  <!-- ── Body slot ───────────────────────────────────────────────── -->
  <section
    class="flex h-full flex-col"
    [class.px-[30px]]="!contentOnly()"
    [class.pt-5]="!contentOnly()"
    [class.pb-5]="!contentOnly()"
    [class.px-5]="contentOnly()"
    [class.py-4]="contentOnly()"
  >
    @if (!contentOnly()) {
      <h2
        [id]="headingId()"
        class="font-soviet m-0 mb-2 text-[clamp(2rem,13vw,2.95rem)] font-extrabold leading-[0.95] tracking-normal text-[#111312]"
      >
        {{ title() }}
      </h2>

      @if (subtitle()) {
        <p class="m-0 max-w-[230px] text-[clamp(0.93rem,4vw,1.08rem)] font-normal leading-[1.22] tracking-normal text-[#5d625d]">
          {{ subtitle() }}
        </p>
      }
    }

    <ng-content />
  </section>
</article>

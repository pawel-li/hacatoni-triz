<main class="min-h-screen bg-gray-100 flex items-center justify-center" aria-label="Main Content">
  <div class="bg-white p-8 rounded-lg shadow-md text-center max-w-sm w-full">
    <h1 class="text-2xl font-bold text-gray-800 mb-4" id="greeting-title">Server Message</h1>
    
    @if (message()) {
      <p class="text-xl text-blue-600 font-semibold" aria-labelledby="greeting-title" aria-live="polite">{{ message() }}</p>
    } @else {
      <p class="text-gray-500 italic" aria-live="polite">Loading...</p>
    }
  </div>
</main>
<router-outlet></router-outlet>
